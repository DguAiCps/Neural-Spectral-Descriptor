# Fast KITTI training for yaw-invariant learned phase-token ablation.
# Output dim with --encoder-preset no_interdiff:
#   288D encoder + 128D GAT context + 64D learned cross-phase token = 480D

data:
  lazy_load: true
  cache_dir: data/preprocessed_kitti_learned_phase_cross_fast
  datasets:
    train:
      - type: kitti
        root: /rise/RISE1/workspace/data/kitti/dataset
        sequences: ['01', '02', '06', '07']
        weight: 1.0
    val:
      - type: kitti
        root: /rise/RISE1/workspace/data/kitti/dataset
        sequences: ['00', '05', '08']
        weight: 1.0
    test: []

encoding:
  projection_type: 'range_image'
  n_azimuth: 360
  max_range: 80.0
  min_range: 1.0
  n_elevation: 16
  elevation_range: [-24.8, 2.0]
  target_elevation_bins: 16
  sensor_elevation_ranges:
    kitti: [-24.8, 2.0]
  bev:
    z_min: -3.0
    height_encoding: 'iris'
    n_height_layers: 8
    z_max: 5.0
  binning_strategy: octave
  n_bins: 16
  alpha: 2.0
  learnable_alpha: true
  epsilon: 1.0e-08
  bin_statistics: ['mean', 'std']
  inter_bin_statistics: []
  zero_center: false
  log_magnitude: false
  normalize_channels: false
  spectral_policy:
    enabled: false
  cross_spectrum:
    enabled: false
    n_freqs: 0
  phase_features:
    source: 'bev_cross'
    layout_sectors: 60
    bev_rows: 16
    bev_freqs: 12
    range_rows: 16
    range_freqs: 0
    bev_height_encoding: 'max'
    bev_height_layers: 8
    bev_min_range: 1.0
    bev_max_range: 80.0
    bev_z_min: -3.0
    bev_z_max: 5.0
  quantization_bits: 16
  descriptor_size: 288

keyframe:
  distance_threshold: 0.8
  rotation_threshold: 20.0
  overlap_threshold: 0.65
  temporal_threshold: 30.0
  voxel_size: 0.2
  max_keyframes: 10000000
  temporal_neighbors: 10
  max_active_nodes: 1000
  freeze_old_embeddings: true
  graph:
    similarity_metric: 'cosine'
    edge_method: 'bayesian'
    similarity_threshold: 0.993
    similarity_max_k: 10
    similarity_min_k: 0
    similarity_exclude_temporal: true
    temporal_edge_mode: 'bidirectional'
    temporal_direction_mode: 'none'
    confidence_level: 0.085
    base_prior: 0.01
    density_k: 50
    density_beta: 10.0
    n_samples: 300000
    prior_signal: 'density'
    multiscale_min_consistency: 0.0
    two_pass:
      enabled: false
      warmup_epochs: 10
      refine_every: 5
      refine_space: 'ctx'
    use_pose_gt_edges: false
    pose_gt_edge_max_k: 10

gnn:
  input_dim: 288
  hidden_dim: 128
  context_dim: 128
  use_residual_gate: true
  gate_hidden_dim: 64
  gate_initial_alpha: 0.0625
  use_edge_confidence_gate: false
  edge_gate_hidden_dim: 16
  phase_token:
    enabled: true
    input_dim: 360
    token_dim: 64
    hidden_dim: 128
    initial_alpha: 0.25
    dropout: 0.1
  n_layers: 2
  n_heads: 4
  dropout: 0.1
  residual: true
  norm_type: 'batch_norm'
  edge_encoding:
    d_edge: 32
    n_edge_types: 2
    d_type_embed: 16
    d_rot_encode: 16
    dropout: 0.1
  local_update_hops: 3
  use_local_updates: true
  use_multi_gpu: false
  patience: 6

retrieval:
  top_k: 10
  spatial_filter_distance: 50.0
  context_window: 10
  use_wasserstein: true
  verification_method: gicp
  icp_fitness_threshold: 0.3
  icp_rmse_threshold: 0.5
  icp_max_iterations: 30
  voxel_downsample: 0.3

system:
  device: cuda
  num_workers: 4
  seed: 42
  output_dir: outputs
  log_dir: logs
  checkpoint_dir: checkpoints

logging:
  use_wandb: false
  wandb_project: neural-spectral-codec-kitti-learned-cross-phase
  wandb_entity: null
  log_interval: 10
  save_interval: 1000

training:
  resume_from_checkpoint: null
  n_epochs: 24
  learning_rate: 5.0e-04
  weight_decay: 1.0e-05
  temperature: 0.1
  log_interval: 10
  use_amp: true
  mine_every_n_epochs: 1
  validate_every_n_epochs: 2
  loss_type: 'infonce'
  temperature_schedule:
    enabled: false
    start: 0.5
    end: 0.05
  smoothap:
    tau: 0.05
    n_pos: 8
    n_neg: 256
    batch_anchors: 32
  edge_aux_lambda: 0.0

triplet:
  positive_distance_max: 5.0
  negative_distance_min: 10.0
  min_temporal_distance: 30
  n_triplets_per_anchor: 3
