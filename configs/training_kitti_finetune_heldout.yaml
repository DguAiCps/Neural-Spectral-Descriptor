# KITTI fine-tuning with held-out validation.
# Train: 01/02/06/07, Val: 09/10, Final eval: run separate scripts on 00/05/08.

data:
  lazy_load: true
  cache_dir: data/preprocessed_kitti_finetune
  datasets:
    train:
      - type: kitti
        root: /rise/RISE1/workspace/data/kitti/dataset
        sequences: ['01', '02', '06', '07']
        weight: 1.0
    val:
      - type: kitti
        root: /rise/RISE1/workspace/data/kitti/dataset
        sequences: ['09', '10']
        weight: 1.0
    test:
      - type: kitti
        root: /rise/RISE1/workspace/data/kitti/dataset
        sequences: ['00', '05', '08']
        weight: 1.0

encoding:
  projection_type: 'range_image'
  n_azimuth: 360
  max_range: 80.0
  min_range: 1.0
  n_elevation: 16
  elevation_range: [-24.8, 2.0]
  target_elevation_bins: 16
  sensor_elevation_ranges:
    kitti: [-24.8, 2.0]
  bev:
    z_min: -3.0
    height_encoding: 'iris'
    n_height_layers: 8
    z_max: 5.0
  binning_strategy: octave
  n_bins: 16
  alpha: 2.0
  learnable_alpha: true
  epsilon: 1.0e-08
  bin_statistics: ['mean', 'std']
  inter_bin_statistics: ['diff']
  zero_center: false
  log_magnitude: false
  normalize_channels: false
  spectral_policy:
    enabled: true
    type: 'soft_binning'
    output_dim: 544
    shared_across_rings: false
    soft_binning:
      n_soft_bins: 9
      stats: ['mean', 'std']
      inter_stats: ['diff']
      init_mode: 'octave'
      alpha: 2.0
    linear:
      d_per_ring: 14
    conv1d:
      channels_per_group: 2
      kernel_size: 7
    attention:
      n_queries: 7
      n_heads: 2
      head_dim: 32
      d_pe: 16
    gated:
      gate_hidden: 64
    lr_scale: 0.05
    warmup_epochs: 2
  quantization_bits: 16
  descriptor_size: 544

keyframe:
  distance_threshold: 0.8
  rotation_threshold: 20.0
  overlap_threshold: 0.65
  temporal_threshold: 30.0
  voxel_size: 0.2
  max_keyframes: 10000000
  temporal_neighbors: 10
  max_active_nodes: 1000
  freeze_old_embeddings: true
  graph:
    similarity_metric: 'cosine'
    edge_method: 'bayesian'
    similarity_threshold: 0.993
    similarity_max_k: 10
    similarity_min_k: 0
    similarity_exclude_temporal: true
    temporal_edge_mode: 'bidirectional'
    temporal_direction_mode: 'none'
    confidence_level: 0.085
    base_prior: 0.01
    density_k: 50
    density_beta: 10.0
    n_samples: 300000
    prior_signal: 'density'
    multiscale_min_consistency: 0.0
    two_pass:
      enabled: false
      warmup_epochs: 10
      refine_every: 5
      refine_space: 'ctx'
    use_pose_gt_edges: false
    pose_gt_edge_max_k: 10

gnn:
  input_dim: 544
  hidden_dim: 128
  context_dim: 128
  use_residual_gate: false
  gate_hidden_dim: 64
  use_edge_confidence_gate: false
  edge_gate_hidden_dim: 16
  n_layers: 2
  n_heads: 4
  dropout: 0.1
  residual: true
  norm_type: 'batch_norm'
  edge_encoding:
    d_edge: 32
    n_edge_types: 2
    d_type_embed: 16
    d_rot_encode: 16
    dropout: 0.1
  local_update_hops: 3
  use_local_updates: true
  use_multi_gpu: false
  patience: 5

retrieval:
  top_k: 10
  spatial_filter_distance: 50.0
  context_window: 10
  use_wasserstein: true
  verification_method: gicp
  icp_fitness_threshold: 0.3
  icp_rmse_threshold: 0.5
  icp_max_iterations: 30
  voxel_downsample: 0.3

system:
  device: cuda
  num_workers: 4
  seed: 42
  output_dir: outputs
  log_dir: logs
  checkpoint_dir: checkpoints

logging:
  use_wandb: false
  wandb_project: neural-spectral-codec-kitti
  wandb_entity: null
  log_interval: 10
  save_interval: 1000

training:
  resume_from_checkpoint: results/ctx128_cosine_bayesian/best_model.pth
  n_epochs: 12
  learning_rate: 1.0e-04
  weight_decay: 1.0e-05
  temperature: 0.1
  log_interval: 10
  use_amp: true
  mine_every_n_epochs: 1
  validate_every_n_epochs: 1
  loss_type: 'infonce'
  temperature_schedule:
    enabled: true
    start: 0.2
    end: 0.07
  smoothap:
    tau: 0.05
    n_pos: 8
    n_neg: 256
    batch_anchors: 32
  edge_aux_lambda: 0.0

triplet:
  positive_distance_max: 5.0
  negative_distance_min: 10.0
  min_temporal_distance: 30
  n_triplets_per_anchor: 3
