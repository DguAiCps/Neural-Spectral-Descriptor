# Multi-Dataset Training Configuration
# Train on HeLiPR + KITTI + NCLT for cross-sensor generalization

# Data settings
data:
  lazy_load: true
  cache_dir: data/preprocessed

  # Multi-dataset configuration
  datasets:
    # Training: Multi-sensor REBALANCED (HeLiPR 18→6, KITTI +01, NCLT +2, MulRan +Sejong03)
    train:
      - type: helipr
        root: /workspace/data/helipr
        sequences: ['Town02', 'Roundabout01', 'Bridge01',
                    'KAIST04', 'DCC04', 'Riverside04']
        weight: 1.0

      - type: kitti
        root: /workspace/data/kitti/dataset
        sequences: ['01', '02', '06', '07']  # +01 added for more HDL-64E signal
        weight: 1.0

      - type: nclt
        root: /workspace/data/nclt
        sequences: ['2012-05-11', '2012-08-04', '2012-11-04',
                    '2012-11-16', '2013-02-23']  # +2 dates added
        weight: 1.0

      - type: mulran
        root: /workspace/data/mulran
        sequences: ['DCC01', 'DCC02', 'KAIST01', 'KAIST02',
                    'Riverside01', 'Riverside02',
                    'Sejong01', 'Sejong02', 'Sejong03']  # +Sejong03 added
        weight: 1.0

    # Validation: Loop-closure-rich sequences from each dataset (cross-sensor eval)
    val:
      - type: kitti
        root: /workspace/data/kitti/dataset
        sequences: ['00', '05', '08']  # High loop closure: 00(urban), 05(residential), 08(highway+urban)
        weight: 1.0

      - type: nclt
        root: /workspace/data/nclt
        sequences: ['2012-01-08', '2013-01-10']  # Campus with many revisits
        weight: 1.0

      - type: helipr
        root: /workspace/data/helipr
        sequences: ['Town01']  # Loop structure
        weight: 1.0

      - type: mulran
        root: /workspace/data/mulran
        sequences: ['DCC03', 'KAIST03', 'Riverside03']  # Cross-session revisit eval
        weight: 1.0

    # Test: KITTI sequence 09, 10 (standard benchmark)
    test:
      - type: kitti
        root: /workspace/data/kitti/dataset
        sequences: ['09', '10']
        weight: 1.0

# Encoding settings
encoding:
  # Projection type: 'range_image' or 'bev' (BEV polar grid with max z-height)
  projection_type: 'range_image'

  # Range settings (shared)
  n_azimuth: 360
  max_range: 80.0
  min_range: 1.0

  # Range image settings (only used when projection_type='range_image')
  n_elevation: 16
  elevation_range: [-24.8, 2.0]     # Default (KITTI HDL-64E)
  target_elevation_bins: 16          # Pool to this many rows
  sensor_elevation_ranges:           # Per-sensor elevation ranges
    helipr: [-15.0, 15.0]           # VLP-16
    kitti: [-24.8, 2.0]             # HDL-64E
    nclt: [-30.67, 10.67]           # HDL-32E
    mulran: [-16.6, 16.6]           # Ouster OS1-64

  # BEV settings (only used when projection_type='bev')
  # n_rows = int(max_range - min_range) = 79 (1m resolution, no pooling)
  bev:
    z_min: -3.0  # Ground filtering threshold
    height_encoding: 'iris'  # 'max' (max z-height) or 'iris' (binary height code)
    n_height_layers: 8       # Number of height layers for iris encoding (8 -> 0~255)
    z_max: 5.0               # Maximum z-height for iris encoding

  # Spectral histogram
  binning_strategy: octave  # 'exponential' (alpha-warped) or 'octave' (log2 scale)
  # Octave: 16×9×2 intra(mean,std) + 16×8×1×2 inter-diff = 288+256 = 544D
  n_bins: 16
  alpha: 2.0
  learnable_alpha: true
  epsilon: 1.0e-08
  bin_statistics: ['mean', 'std']  # Per-bin statistics: sum, mean, std, max, min
  inter_bin_statistics: ['diff']   # Adjacent-bin diff per base stat: adds n_stats×240D

  # FFT preprocessing
  zero_center: false      # Subtract row mean before FFT (removes DC component)
  log_magnitude: false    # log(|FFT| + ε) for compressed dynamic range

  # Channel normalization (false = raw magnitudes for standardized L2 edges)
  normalize_channels: false

  # Spectral policy: learnable FFT→descriptor (replaces fixed binning when enabled)
  spectral_policy:
    enabled: true                     # true = learnable soft binning (best: R@1 0.5162)
    type: 'soft_binning'             # 'soft_binning', 'linear', 'conv1d', 'attention', 'gated'
    output_dim: 544                   # Auto-computed: 16 rings × 34 per_ring (9 bins)
    shared_across_rings: false        # false = per-ring bin boundaries (288 params)

    soft_binning:
      n_soft_bins: 9
      stats: ['mean', 'std']
      inter_stats: ['diff']
      init_mode: 'octave'             # 'octave', 'exponential', 'uniform'
      alpha: 2.0

    linear:
      d_per_ring: 14                  # 79 * 14 = 1106

    conv1d:
      channels_per_group: 2
      kernel_size: 7

    attention:
      n_queries: 7
      n_heads: 2
      head_dim: 32
      d_pe: 16

    gated:
      gate_hidden: 64

    lr_scale: 0.1                     # Policy learning rate = base_lr * lr_scale
    warmup_epochs: 3                  # Freeze policy for N epochs

  # Quantization
  quantization_bits: 16
  descriptor_size: 544

# Keyframe selection settings
keyframe:
  distance_threshold: 0.8    # 0.8 → 3.0 (more sparse, reduce over-smoothing)
  rotation_threshold: 20.0   # 20 → 30 (larger rotation change required)
  overlap_threshold: 0.65    # Keep same
  temporal_threshold: 30.0   # 7.5 → 30.0 (3 sec @ 10Hz, much more selective)
  voxel_size: 0.2
  max_keyframes: 10000000

  # Graph settings
  temporal_neighbors: 10      # 15→10: reduce edges for 16GB VRAM (5+5 temporal still ample)
  max_active_nodes: 1000
  freeze_old_embeddings: true

  # Similarity graph edges
  graph:
    similarity_metric: 'cosine'         # CRITICAL: cosine is discriminative (AUC 0.76) vs l2 (AUC 0.60).
                                        # All previous similarity edge experiments used l2 → failed.
    edge_method: 'bayesian'            # Bayesian posterior on cosine — optimal F1 at τ=0.085
    similarity_threshold: 0.993        # Unused when edge_method='bayesian'
    similarity_max_k: 10               # Per-node neighbor cap
    similarity_exclude_temporal: true   # Exclude temporal neighbors

    # Bayesian edge selection (when edge_method='bayesian')
    # τ=0.085 is the optimal F1 threshold from posterior analysis (AUC 0.7563 on cosine).
    # See scripts/analyze_bayesian_posterior.py + docs/similarity_edge_experiments.md.
    confidence_level: 0.085            # Optimal F1 from TP/FP analysis (was 0.90 — too strict)
    base_prior: 0.01                   # P(same_place) base rate (~1% of pairs are revisits)
    density_k: 50                      # k-NN for local descriptor density estimation (used when prior_signal='density')
    density_beta: 10.0                 # Prior signal → prior sensitivity (higher = stricter)
    n_samples: 1000000                 # Random pairs for distribution fitting (10x default for more same-place pairs)

    # Adaptive prior signal: 'density' (k-NN proxy) or 'entropy' (spectral entropy, direct aliasing measure)
    prior_signal: 'density'

    # Multi-scale consistency: filter edges where per-channel similarities are inconsistent
    # (aliased pairs match in low-order stats but diverge in higher-order ones)
    multiscale_min_consistency: 0.0    # 0.0 = disabled, 0.7 = moderate filtering

    # Two-pass similarity edge refinement (disabled when use_pose_gt_edges=true):
    # Raw spectral descriptors cannot discriminate same-place from diff-place
    # (Fisher ratio ~0.07, max posterior ~0.025). Periodically rebuild similarity
    # edges using the current GNN ctx embeddings, which acquire discriminability
    # through training.
    two_pass:
      enabled: false
      warmup_epochs: 10                # Temporal-only initial training
      refine_every: 5                  # Rebuild edges every N epochs (aligned with triplet re-mine)
      refine_space: 'ctx'              # 'ctx' (128D, recommended) | 'full' (672D) | 'raw' (control)

    # Ground-truth pose-based similarity edges (TRAIN ONLY). Disabled:
    # experiments showed similarity edges (pose-GT or ctx-derived) hurt
    # vs no-edges baseline (0.6753 / 0.7082 vs 0.7309).
    use_pose_gt_edges: false
    pose_gt_edge_max_k: 10             # Max edges per node (sparsity cap)

# GNN settings
gnn:
  # Architecture (TransformerConv + concat)
  # Soft binning: input_dim auto-computed = 16 rings × (9×2 + 8×1×2) = 16×34 = 544D
  # Hard octave:  input_dim = 16×9×2 + 16×8×1×2 = 288+256 = 544D (same dim)
  input_dim: 544
  hidden_dim: 128
  context_dim: 128   # output: cat(raw_544, ctx_128) = 672D

  # Residual gate: disabled (saturated at α=1.0 — no per-keyframe differentiation).
  use_residual_gate: false
  gate_hidden_dim: 64

  # Edge confidence gate: disabled — Bayesian posterior on cosine is sufficient
  # discriminative signal (AUC 0.76 from analysis), no learned gate needed.
  use_edge_confidence_gate: false
  edge_gate_hidden_dim: 16
  n_layers: 2
  n_heads: 4         # 128/2 = 64D per head
  dropout: 0.1
  residual: true
  norm_type: 'batch_norm'  # Match baseline ctx128_rebalanced for clean comparison

  # Edge encoding (type-aware: temporal + similarity)
  edge_encoding:
    d_edge: 32            # Edge embedding output dimension
    n_edge_types: 2       # 0=temporal, 1=similarity
    d_type_embed: 16      # Learnable type embedding dimension
    d_rot_encode: 16      # Sinusoidal rotation encoding dimension
    dropout: 0.1

  # Local updates
  local_update_hops: 3
  use_local_updates: true

  # Training settings
  use_multi_gpu: false  # PyTorch Geometric doesn't support DataParallel
  patience: 10  # Early stopping

# Retrieval settings
retrieval:
  # Stage 1: Global retrieval
  top_k: 10
  spatial_filter_distance: 50.0
  context_window: 10
  use_wasserstein: true

  # Stage 2: Geometric verification
  verification_method: gicp
  icp_fitness_threshold: 0.3
  icp_rmse_threshold: 0.5
  icp_max_iterations: 30
  voxel_downsample: 0.3

# System settings
system:
  device: cuda
  num_workers: 4
  seed: 42
  output_dir: outputs
  log_dir: logs
  checkpoint_dir: checkpoints

# Logging settings
logging:
  use_wandb: false
  wandb_project: neural-spectral-codec-multi
  wandb_entity: null
  log_interval: 10
  save_interval: 1000

# Training settings
training:
  n_epochs: 100
  learning_rate: 5.0e-04
  weight_decay: 1.0e-05
  temperature: 0.1  # InfoNCE temperature (0.07 was too aggressive, caused overfitting in 1-2 epochs)
  log_interval: 10
  use_amp: true   # Re-enabled (no-AMP OOM at 17GB). Pair with LayerNorm to avoid BatchNorm-AMP NaN.
  mine_every_n_epochs: 5    # Re-mine triplets every N epochs (raw descriptors are stable)
  validate_every_n_epochs: 3  # Run validation every N epochs (always on first/last/near-early-stop)

  # Loss function: 'infonce' (default, single-positive contrastive) or 'smoothap'
  # (multi-positive AP optimization, directly aligned with R@k retrieval metric).
  loss_type: 'infonce'
  smoothap:
    tau: 0.05
    n_pos: 8
    n_neg: 256
    batch_anchors: 32

  # Edge confidence gate auxiliary BCE loss weight.
  # Total loss = InfoNCE + edge_aux_lambda * BCE(c_e, pose_gt_label_e).
  # 0.0 disables aux supervision; gate runs but is unsupervised (likely noise).
  edge_aux_lambda: 0.0   # Edge gate disabled, no aux loss

# Triplet mining settings
triplet:
  positive_distance_max: 5.0
  negative_distance_min: 10.0
  min_temporal_distance: 30
  n_triplets_per_anchor: 3
